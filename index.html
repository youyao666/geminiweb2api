<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Web 2 API</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap");

      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

      :root {
        --bg:#080c14;--bg2:#0d1220;--bg3:#111827;
        --glass:rgba(255,255,255,0.045);--glass2:rgba(255,255,255,0.07);
        --stroke:rgba(255,255,255,0.08);--stroke2:rgba(255,255,255,0.13);
        --t0:rgba(255,255,255,0.94);--t1:rgba(255,255,255,0.72);--t2:rgba(255,255,255,0.50);
        --accent:#61d7ff;--accent2:#8effc1;--accent3:#b794f4;
        --warn:#ffd08a;--danger:#ff7a7a;
        --r1:20px;--r2:14px;
        --shadow:0 24px 80px rgba(0,0,0,.45);
        --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
        --sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
      }

      html{scroll-behavior:smooth}

      body{
        font-family:var(--sans);color:var(--t0);min-height:100vh;
        background:var(--bg);
        overflow-x:hidden;
      }

      /* bg art */
      body::before{
        content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
        background:
          radial-gradient(900px 600px at 10% 10%, rgba(97,215,255,.12), transparent 60%),
          radial-gradient(800px 500px at 90% 20%, rgba(142,255,193,.08), transparent 55%),
          radial-gradient(700px 500px at 50% 90%, rgba(183,148,244,.07), transparent 55%);
      }

      /* scrollbar */
      ::-webkit-scrollbar{width:6px;height:6px}
      ::-webkit-scrollbar-track{background:transparent}
      ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}

      /* ── header ── */
      .top{
        position:sticky;top:0;z-index:30;
        backdrop-filter:blur(16px) saturate(1.4);
        background:rgba(8,12,20,.72);
        border-bottom:1px solid var(--stroke);
      }
      .top-inner{
        max-width:1240px;margin:0 auto;padding:0 24px;
        height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px;
      }
      .brand{display:flex;align-items:center;gap:12px}
      .logo{
        width:32px;height:32px;border-radius:10px;
        background:linear-gradient(135deg,rgba(97,215,255,.85),rgba(142,255,193,.7));
        border:1px solid rgba(255,255,255,.15);
        box-shadow:0 0 20px rgba(97,215,255,.25);
      }
      .brand b{font-size:14px;font-weight:700;letter-spacing:.3px}
      .nav-r{display:flex;align-items:center;gap:10px}
      .btn{
        display:inline-flex;align-items:center;gap:8px;
        height:34px;padding:0 14px;border-radius:10px;
        border:1px solid var(--stroke2);background:var(--glass);
        color:var(--t1);font:500 13px var(--sans);text-decoration:none;
        cursor:pointer;transition:.15s ease;user-select:none;
      }
      .btn:hover{border-color:rgba(255,255,255,.22);background:var(--glass2);color:var(--t0);transform:translateY(-1px)}
      .btn.primary{border-color:rgba(97,215,255,.3);background:rgba(97,215,255,.1);color:var(--accent)}
      .btn.primary:hover{background:rgba(97,215,255,.18)}
      .chip{
        display:inline-flex;align-items:center;gap:6px;
        height:28px;padding:0 12px;border-radius:99px;
        border:1px solid var(--stroke);background:var(--glass);
        font:500 12px var(--sans);color:var(--t2);
      }
      .chip .dot{width:7px;height:7px;border-radius:50%}
      .chip.ok{border-color:rgba(142,255,193,.25);color:rgba(142,255,193,.9)}
      .chip.ok .dot{background:var(--accent2);box-shadow:0 0 6px rgba(142,255,193,.6)}
      .chip.err{border-color:rgba(255,122,122,.25);color:rgba(255,122,122,.9)}
      .chip.err .dot{background:var(--danger);box-shadow:0 0 6px rgba(255,122,122,.6)}

      /* ── main ── */
      .main{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:32px 24px 48px}

      /* hero */
      .hero{margin-bottom:28px}
      .hero h1{font-size:30px;font-weight:800;letter-spacing:-.4px;line-height:1.2}
      .hero p{margin-top:6px;color:var(--t2);font-size:14px}

      /* sparkline area */
      .spark-area{
        margin-bottom:20px;border-radius:var(--r1);
        border:1px solid var(--stroke);background:var(--glass);
        padding:16px 18px;
        overflow:hidden;position:relative;
      }
      .spark-area::after{
        content:"";position:absolute;inset:0;pointer-events:none;
        background:linear-gradient(180deg,transparent 60%,rgba(8,12,20,.7));
      }
      .spark-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;position:relative;z-index:1}
      .spark-head span{font:600 12px var(--sans);color:var(--t2);letter-spacing:.5px;text-transform:uppercase}
      .spark-val{font:700 13px var(--mono);color:var(--accent)}
      svg.spark{display:block;width:100%;height:48px;position:relative;z-index:1}
      svg.spark .line{fill:none;stroke:var(--accent);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
      svg.spark .area{fill:url(#sparkGrad)}

      /* grid */
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:20px}

      /* card */
      .card{
        border-radius:var(--r1);border:1px solid var(--stroke);
        background:var(--glass);padding:18px;
        transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
        position:relative;overflow:hidden;
      }
      .card::before{
        content:"";position:absolute;top:-40%;right:-30%;width:60%;height:80%;
        border-radius:50%;pointer-events:none;
        background:radial-gradient(circle,rgba(97,215,255,.06),transparent 70%);
      }
      .card:hover{transform:translateY(-2px);border-color:var(--stroke2);box-shadow:0 12px 40px rgba(0,0,0,.3)}
      .card .label{font:500 12px var(--sans);color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px;letter-spacing:.3px}
      .card .label svg{width:15px;height:15px;fill:var(--t2)}
      .card .val{font:800 28px var(--mono);letter-spacing:-.5px;line-height:1;transition:color .3s}
      .card .sub{font:500 11px var(--sans);color:var(--t2);margin-top:6px}
      .card.c-accent::before{background:radial-gradient(circle,rgba(97,215,255,.08),transparent 70%)}
      .card.c-green::before{background:radial-gradient(circle,rgba(142,255,193,.07),transparent 70%)}
      .card.c-red::before{background:radial-gradient(circle,rgba(255,122,122,.06),transparent 70%)}
      .card.c-purple::before{background:radial-gradient(circle,rgba(183,148,244,.06),transparent 70%)}
      .card.c-accent .val{color:var(--accent)}
      .card.c-green .val{color:var(--accent2)}
      .card.c-red .val{color:var(--danger)}
      .card.c-purple .val{color:var(--accent3)}

      /* bar for success rate */
      .bar-track{width:100%;height:6px;border-radius:99px;background:rgba(255,255,255,.06);margin-top:10px;overflow:hidden}
      .bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s cubic-bezier(.22,1,.36,1)}

      /* note area */
      .note-card{
        border-radius:var(--r1);border:1px solid var(--stroke);
        background:var(--glass);padding:20px;
      }
      .note-card .note-title{font:600 13px var(--sans);color:var(--t2);margin-bottom:10px;display:flex;align-items:center;gap:8px;letter-spacing:.3px}
      .note-card .note-title svg{width:16px;height:16px;fill:var(--t2)}
      .note-card p{font:400 13px/1.7 var(--mono);color:var(--t1);white-space:pre-wrap;margin:0}

      /* footer */
      footer{text-align:center;padding:24px;font:400 12px var(--sans);color:var(--t2);position:relative;z-index:1}

      /* entrance animation */
      .anim{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
      .anim.show{opacity:1;transform:translateY(0)}
      .anim:nth-child(2){transition-delay:.04s}
      .anim:nth-child(3){transition-delay:.08s}
      .anim:nth-child(4){transition-delay:.12s}
      .anim:nth-child(5){transition-delay:.16s}
      .anim:nth-child(6){transition-delay:.2s}
      .anim:nth-child(7){transition-delay:.24s}
      .anim:nth-child(8){transition-delay:.28s}

      @media(max-width:640px){
        .hero h1{font-size:22px}
        .grid{grid-template-columns:1fr 1fr}
        .card .val{font-size:22px}
        .top-inner{padding:0 14px}
        .main{padding:20px 14px 36px}
      }
      @media(max-width:400px){.grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <header class="top">
      <div class="top-inner">
        <div class="brand">
          <div class="logo"></div>
          <b>Dashboard</b>
        </div>
        <div class="nav-r">
          <a class="btn" href="/help">Help</a>
          <div class="chip" id="chip"><span class="dot"></span><span id="chipTxt">Connecting...</span></div>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="hero anim">
        <h1>Gemini Web 2 API</h1>
        <p>Real-time telemetry &amp; monitoring</p>
      </div>

      <!-- sparkline -->
      <div class="spark-area anim">
        <div class="spark-head">
          <span>Requests / minute (live)</span>
          <span class="spark-val" id="rpmLabel">-- rpm</span>
        </div>
        <svg class="spark" viewBox="0 0 600 48" preserveAspectRatio="none">
          <defs>
            <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(97,215,255,.3)"/>
              <stop offset="100%" stop-color="rgba(97,215,255,0)"/>
            </linearGradient>
          </defs>
          <path class="area" d="" id="sparkArea"/>
          <path class="line" d="" id="sparkLine"/>
        </svg>
      </div>

      <!-- metric cards -->
      <div class="grid" id="grid"></div>

      <!-- note -->
      <div class="note-card anim">
        <div class="note-title">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          Notes
        </div>
        <p id="note">Loading...</p>
      </div>
    </main>

    <footer>Gemini Web 2 API &middot; by XxxXTeam</footer>

    <script>
      // ── card definitions ──
      const CARDS = [
        {id:"uptime",     label:"Uptime",          cls:"c-accent",  icon:"clock",     sub:"seconds online"},
        {id:"rpm",        label:"RPM",             cls:"c-accent",  icon:"speed",     sub:"requests / min"},
        {id:"total",      label:"Total Requests",  cls:"",          icon:"bar",       sub:"lifetime"},
        {id:"ok",         label:"Succeeded",       cls:"c-green",   icon:"check",     sub:""},
        {id:"fail",       label:"Failed",          cls:"c-red",     icon:"error",     sub:""},
        {id:"inpTok",     label:"Input Tokens",    cls:"c-purple",  icon:"down",      sub:"estimated"},
        {id:"outTok",     label:"Output Tokens",   cls:"c-purple",  icon:"up",        sub:"estimated"},
      ];
      const ICONS={
        clock:`<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>`,
        speed:`<svg viewBox="0 0 24 24"><path d="M19.03 7.39l1.42-1.42c-4.37-3.92-11.11-3.92-15.48 0l1.42 1.42c3.59-3.21 9.06-3.21 12.64 0zm-2.83 2.83l1.42-1.42c-2.81-2.52-7.14-2.52-9.95 0l1.42 1.42c2.03-1.81 5.09-1.81 7.11 0zM12 13c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>`,
        bar:`<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>`,
        check:`<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`,
        error:`<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`,
        down:`<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h-2v5H6l4 4 4-4z"/></svg>`,
        up:`<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 9h-2v5h-2v-5H8l4-4 4 4z"/></svg>`,
      };

      // build cards
      const grid=document.getElementById("grid");
      CARDS.forEach((c,i)=>{
        const d=document.createElement("div");
        d.className="card "+c.cls+" anim";
        d.style.transitionDelay=(i*.05)+"s";
        d.innerHTML=`<div class="label">${ICONS[c.icon]||""}${c.label}</div><div class="val" id="${c.id}">--</div>${c.sub?`<div class="sub">${c.sub}</div>`:""}`;
        if(c.id==="ok"||c.id==="fail"){
          d.innerHTML+=`<div class="bar-track"><div class="bar-fill" id="${c.id}Bar" style="width:0"></div></div>`;
        }
        grid.appendChild(d);
      });

      // sparkline state
      const sparkPts=[];
      const MAX_SPARK=60;

      function updateSpark(rpm){
        sparkPts.push(rpm);
        if(sparkPts.length>MAX_SPARK) sparkPts.shift();
        const w=600,h=48,max=Math.max(...sparkPts,1)*1.15;
        const step=w/Math.max(MAX_SPARK-1,1);
        let line="",area="",first=true;
        sparkPts.forEach((v,i)=>{
          const x=i*step, y=h-(v/max)*h;
          if(first){line+=`M${x},${y}`;area+=`M${x},${h}L${x},${y}`;first=false}
          else{line+=` L${x},${y}`;area+=` L${x},${y}`}
        });
        if(sparkPts.length){area+=` L${(sparkPts.length-1)*step},${h}Z`}
        document.getElementById("sparkLine").setAttribute("d",line);
        document.getElementById("sparkArea").setAttribute("d",area);
      }

      // animated number
      const animMap={};
      function setVal(id,target,fmt){
        const el=document.getElementById(id);if(!el) return;
        const prev=animMap[id]||0;
        if(target===prev){el.textContent=fmt?fmt(target):target.toLocaleString();return}
        animMap[id]=target;
        const dur=600,start=performance.now();
        function tick(now){
          const t=Math.min((now-start)/dur,1);
          const ease=1-Math.pow(1-t,3);
          const cur=Math.round(prev+(target-prev)*ease);
          el.textContent=fmt?fmt(cur):cur.toLocaleString();
          if(t<1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      function fmtUptime(s){
        if(isNaN(s)||s<0) return "--";
        const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),sec=Math.floor(s%60);
        return (d?d+"d ":"")+(h||d?h+"h ":"")+(m||h||d?m+"m ":"")+sec+"s";
      }

      function setStatus(ok){
        const chip=document.getElementById("chip"),txt=document.getElementById("chipTxt");
        chip.classList.toggle("ok",ok);chip.classList.toggle("err",!ok);
        txt.textContent=ok?"Online":"Offline";
      }

      async function fetchAll(){
        try{
          const r=await fetch("/api/telemetry");if(!r.ok) throw 0;
          const d=await r.json();
          setStatus(true);
          setVal("uptime",d.uptime_seconds,fmtUptime);
          const rpm=+(d.rpm||0).toFixed(1);
          setVal("rpm",rpm,v=>v.toFixed(1));
          document.getElementById("rpmLabel").textContent=rpm+" rpm";
          updateSpark(rpm);
          setVal("total",d.total_requests);
          setVal("ok",d.success_requests);
          setVal("fail",d.failed_requests);
          setVal("inpTok",d.input_tokens);
          setVal("outTok",d.output_tokens);
          // success bar
          const total=d.total_requests||0,ok=d.success_requests||0;
          const pct=total>0?Math.round(ok/total*100):0;
          const ob=document.getElementById("okBar"),fb=document.getElementById("failBar");
          if(ob) ob.style.width=pct+"%";
          if(fb) fb.style.width=(100-pct)+"%";
          // note
          document.getElementById("note").textContent=(d.note&&d.note.length)?d.note.join("\n"):"No notes.";
        }catch(e){setStatus(false)}
      }

      // entrance
      requestAnimationFrame(()=>{
        document.querySelectorAll(".anim").forEach(el=>el.classList.add("show"));
      });

      fetchAll();
      setInterval(fetchAll,5000);
    </script>
  </body>
</html>
